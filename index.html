<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipkart Image Downloader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 0;
    }

    .wrap {
      max-width: 700px;
      margin: 50px auto;
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #222;
      text-align: center;
    }

    p {
      color: #555;
      text-align: center;
      margin-bottom: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 250px;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #2874f0;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1659c7;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: #444;
    }

    .result {
      margin-top: 24px;
      display: none;
    }

    .result img {
      width: 100%;
      max-width: 400px;
      display: block;
      margin: 0 auto 15px;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    .actions {
      text-align: center;
    }

    .download-link {
      display: inline-block;
      padding: 12px 18px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
    }

    .small {
      font-size: 12px;
      color: #777;
      margin-top: 12px;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Flipkart Image Downloader</h1>
    <p>Flipkart product link paste korle main image preview aar download pabe</p>

    <div class="row">
      <input id="productUrl" type="text" placeholder="Paste Flipkart product URL" />
      <button onclick="getImage()">Get Image</button>
    </div>

    <div class="status" id="status"></div>

    <div class="result" id="result">
      <img id="preview" src="" alt="Product image preview" />
      <div class="actions">
        <a id="downloadBtn" class="download-link" href="#" download="flipkart-product-image.jpg">Download Image</a>
      </div>
      <div class="small" id="imageUrlText"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://imagefatch.pradipkoley996.workers.dev/";

    async function getImage() {
      const input = document.getElementById("productUrl");
      const status = document.getElementById("status");
      const result = document.getElementById("result");
      const preview = document.getElementById("preview");
      const downloadBtn = document.getElementById("downloadBtn");
      const imageUrlText = document.getElementById("imageUrlText");

      const url = input.value.trim();

      result.style.display = "none";
      status.textContent = "";

      if (!url) {
        status.textContent = "Please paste a Flipkart product URL.";
        return;
      }

      try {
        status.textContent = "Fetching image...";

        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Failed to fetch image.");
        }

        if (!data.image) {
          throw new Error("No image found.");
        }

        preview.src = data.image;
        downloadBtn.href = data.image;
        imageUrlText.textContent = data.image;
        result.style.display = "block";
        status.textContent = "Image found successfully.";
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
